[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-config --strict-markers --alluredir=allure-results --clean-alluredir
markers =
    smoke: service availability tests
    auth: login, token and authorization tests
    users: user registration/profile/password tests
    admin: administrator-only user management tests
    items: item API tests
    flow: multi-step business flow tests
    schema: response JSON schema validation tests
    db: database persistence assertion tests; requires API_TEST_DATABASE_URL
